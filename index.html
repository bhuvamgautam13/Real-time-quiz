<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizBlitz — Real-Time Multiplayer Quiz Engine</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="bg-grid"></div>
  <canvas id="particle-canvas"></canvas>

  <div id="app">

    <section id="join-screen" class="screen active">
      <div class="card join-card">
        <div class="logo-badge">⚡</div>
        <h1 class="brand">Quiz<span>Blitz</span></h1>
        <p class="tagline">Real-Time Multiplayer Quiz Engine</p>

        <div class="input-group">
          <label for="player-name">Your Name</label>
          <input
            id="player-name"
            type="text"
            placeholder="Enter your player name…"
            maxlength="20"
            autocomplete="off"
          />
        </div>

        <button id="join-btn" class="btn btn-primary">
          <span class="btn-text">Join Quiz</span>
          <span class="btn-icon">→</span>
        </button>

        <p id="join-error" class="error-msg hidden">Please enter a valid name.</p>

        <div class="live-players">
          <div class="live-dot"></div>
          <span id="live-count">0 players online</span>
        </div>

        <div id="join-ticker" class="ticker hidden">
          <div class="ticker-inner"></div>
        </div>
      </div>
    </section>

    <section id="quiz-screen" class="screen">
      <div class="quiz-topbar">
        <div class="player-pill">
          <span class="pip"></span>
          <span id="current-player-name">Player</span>
        </div>
        <div class="score-pill">
          Score: <strong id="player-score">0</strong>
        </div>
      </div>

      <div class="card quiz-card">
        <div class="quiz-meta">
          <span id="question-counter">Q 1 / 5</span>
          <div class="timer-ring">
            <svg viewBox="0 0 48 48">
              <circle class="ring-bg" cx="24" cy="24" r="20"/>
              <circle id="ring-fill" class="ring-fill" cx="24" cy="24" r="20"/>
            </svg>
            <span id="timer-label">10</span>
          </div>
        </div>

        <div class="progress-bar-wrap">
          <div id="progress-bar" class="progress-bar"></div>
        </div>

        <p id="question-text" class="question-text">Loading question…</p>

        <div id="options-grid" class="options-grid">
        </div>

        <button id="submit-btn" class="btn btn-accent" disabled>
          Submit Answer
        </button>
      </div>
    </section>

    <section id="leaderboard-screen" class="screen">
      <div class="card leaderboard-card">
        <div class="lb-header">
          <span class="trophy">🏆</span>
          <h2>Leaderboard</h2>
          <p class="lb-sub">Live scores — updates in real time</p>
        </div>

        <ol id="leaderboard-list" class="lb-list">
        </ol>

        <button id="play-again-btn" class="btn btn-primary mt">
          Play Again
        </button>
      </div>
    </section>

  </div>

  <script src="script.js"></script>
</body>
</html>
