<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — QuizArena</title>
  <link rel="stylesheet" href="/css/global.css"/>
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px}
    .auth-wrap{width:100%;max-width:440px;position:relative;z-index:1}
    .auth-logo{text-align:center;margin-bottom:32px}
    .auth-logo h1{font-size:1.9rem;color:var(--accent-cyan);text-shadow:var(--glow-cyan)}
    .auth-logo p{color:var(--text-muted);margin-top:8px}
    .auth-footer{text-align:center;margin-top:20px;color:var(--text-muted);font-size:.9rem}
    .auth-footer a{color:var(--accent-cyan);text-decoration:none}
    .google-divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--text-muted);font-size:.85rem}
    .google-divider::before,.google-divider::after{content:'';flex:1;height:1px;background:var(--border-subtle)}
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-logo">
      <h1>⚡ QUIZ ARENA</h1>
      <p>Welcome back! Sign in to compete</p>
    </div>
    <div class="card">
      <form id="loginForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="your@email.com" required/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Your password" required/>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-bottom:4px">SIGN IN →</button>
      </form>
      <div class="google-divider">or</div>
      <a href="/api/auth/google" class="btn btn-google" style="width:100%;text-decoration:none">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.29-8.16 2.29-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continue with Google
      </a>
    </div>
    <div class="auth-footer">No account? <a href="/pages/signup.html">Create one free →</a></div>
  </div>
  <div class="toast-container" id="toastContainer"></div>
  <script>if (isLoggedIn()) {
  window.location.href = '/pages/dashboard.html';
}
</script>
 <script type="module" src="/js/utils.js"></script>
<script type="module" src="/js/auth.js"></script>

</body>
</html>
